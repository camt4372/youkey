<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="유키님의 오픈프로필">
    <meta property="og:title" content="거내 100+">
    <meta property="og:description" content="유키님의 오픈프로필">
    <meta property="og:image" content="https://media.discordapp.net/attachments/1354404766213476442/1493116642278899774/Screenshot_20260413_141223_KakaoTalk.jpg?ex=69ddccbc&is=69dc7b3c&hm=eba8944a4eac3eec08929805683a500c93bdf95d8213496667cc43762f71f792&=&format=webp&width=1181&height=589">    
    <title>오픈프로필</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", "Malgun Gothic", sans-serif;
            background-color: #f0f0f0; display: flex; justify-content: center;
        }
        .container {
            width: 100%; max-width: 480px; background-color: #ffffff;
            min-height: 100vh; position: relative; padding-bottom: 20px;
        }
        .profile-img-global {
            background-image: url('https://media.discordapp.net/attachments/1354404817115807926/1493105956652060834/Screenshot_20260413_132620_KakaoTalk.jpg?ex=69ddc2c8&is=69dc7148&hm=2e373534f617da63df213dac4fab3bcb6933d75ee63c0832159a2c90e8941f2f&=&format=webp&width=438&height=438');
            background-size: cover; background-position: center;
        }
        .header { display: flex; justify-content: space-between; align-items: center; padding: 15px 20px; font-size: 22px; color: #222; }
        .header-icons { display: flex; align-items: center; gap: 16px; }
        .profile-area { display: flex; flex-direction: column; align-items: center; margin-top: 10px; }
        .profile-image-container { position: relative; }
        .profile-img { width: 110px; height: 110px; border-radius: 50%; background-color: #e0e0e0; }
        .profile-badge {
            position: absolute; bottom: 0; right: 0; width: 32px; height: 32px;
            background-color: #636b77; border-radius: 50%; display: flex; justify-content: center;
            align-items: center; border: 2px solid #ffffff;
        }
        .profile-badge-inner { display: flex; gap: 2px; }
        .profile-badge-inner div { width: 6px; height: 10px; background-color: #fff; border-radius: 1px; }
        .profile-name { font-size: 24px; font-weight: 800; margin-top: 15px; color: #111; }
        .profile-sub { font-size: 14px; color: #999; margin-top: 6px; margin-bottom: 20px; }
        .tag-area { display: flex; justify-content: center; gap: 8px; margin-bottom: 40px; }
        .tag { background-color: #f2f2f2; padding: 8px 16px; border-radius: 20px; font-size: 14px; font-weight: 600; color: #444; }
        .chat-btn-area { display: flex; justify-content: center; margin-bottom: 40px; }
        .chat-link { text-decoration: none; display: flex; flex-direction: column; align-items: center; color: inherit; }
        .chat-icon-circle {
            width: 50px; height: 50px; border-radius: 50%; background-color: #fafafa;
            border: 1px solid #ebebeb; display: flex; justify-content: center; align-items: center;
            margin-bottom: 10px; color: #555; font-size: 20px;
        }
        .chat-text { font-size: 13px; color: #666; }
        .grid-wrap { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; padding: 0 20px; }
        .grid-item { border: 1px solid #efefef; border-radius: 12px; overflow: hidden; display: flex; flex-direction: column; background-color: #fff; cursor: pointer; }
        .post-thumbnail {
            width: 100%; height: 160px; background-color: #f9f9f9;
            background-size: cover; background-position: center; border-bottom: 1px solid #efefef;
        }
        .post-preview-text {
            padding: 12px; font-size: 13px; color: #333; line-height: 1.4;
            display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical;
            overflow: hidden; text-overflow: ellipsis; min-height: 48px;
        }
        #post-view { display: none; background-color: #fff; height: 100vh; flex-direction: column; overflow-y: auto; padding-bottom: 50px;}
        .post-top-header { display: flex; align-items: center; justify-content: space-between; padding: 15px 20px; border-bottom: 1px solid #eee; position: sticky; top: 0; background: #fff; z-index: 10;}
        .post-top-left { display: flex; align-items: center; gap: 15px; font-size: 18px; font-weight: 600; }
        .post-top-left i { cursor: pointer; padding: 5px; }
        .post-top-right .mini-profile { width: 24px; height: 24px; border-radius: 50%; position: relative; }
        .post-top-right .mini-profile::after { content: ''; position: absolute; top: -2px; right: -2px; width: 6px; height: 6px; background-color: red; border-radius: 50%; }
        .post-author-info { padding: 15px 20px 5px 20px; display: flex; justify-content: space-between; align-items: flex-start; }
        .author-left { display: flex; gap: 10px; }
        .author-pic { width: 36px; height: 36px; border-radius: 50%; }
        .author-details { display: flex; flex-direction: column; justify-content: center; }
        .author-name { font-size: 15px; font-weight: bold; color: #111; }
        .author-time { font-size: 12px; color: #999; margin-top: 2px; }
        .author-more { color: #ccc; letter-spacing: 2px; }
        .post-title-text { padding: 0 20px 15px 20px; font-size: 15px; font-weight: 400; color: #111; line-height: 1.5; white-space: pre-wrap;}
        .post-image-container { width: 100%; }
        .post-image-container img { width: 100%; display: block; }
        .hide { display: none !important; }

        @keyframes slideInRight {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
        .slide-in { animation: slideInRight 0.3s ease forwards; }

        @keyframes slideOutRight {
            from { transform: translateX(0); opacity: 1; }
            to { transform: translateX(100%); opacity: 0; }
        }
        .slide-out { animation: slideOutRight 0.3s ease forwards; }
    </style>
</head>
<body>

<div class="container">
    <div id="home-view">
        <div class="header">
            <i class="fa-solid fa-xmark"></i>
            <div class="header-icons"><i class="fa-solid fa-ellipsis-vertical"></i></div>
        </div>
        <div class="profile-area">
            <div class="profile-image-container">
                <div class="profile-img profile-img-global"></div>
                <div class="profile-badge"><div class="profile-badge-inner"><div></div><div></div></div></div>
            </div>
            <div class="profile-name">유키</div>
            <div class="profile-sub">거내 100+</div>
        </div>
        <div class="tag-area">
            <div class="tag"># 선원조각</div><div class="tag"># 세일러피스</div><div class="tag"># 질문은갠</div>
        </div>
        <div class="chat-btn-area">
            <a href="https://open.kakao.com/o/s1LPiUpi" class="chat-link">
                <div class="chat-icon-circle"><i class="fa-regular fa-comment-dots"></i></div>
                <div class="chat-text">1:1 오픈채팅</div>
            </a>
        </div>
        <div class="grid-wrap" id="post-grid"></div>
    </div>

    <div id="post-view" class="hide">
        <div class="post-top-header">
            <div class="post-top-left">
                <i class="fa-solid fa-arrow-left" onclick="closePost()"></i>
                <span>포스트</span>
            </div>
            <div class="post-top-right">
                <div class="mini-profile profile-img-global"></div>
            </div>
        </div>
        <div class="post-author-info">
            <div class="author-left">
                <div class="author-pic profile-img-global"></div>
                <div class="author-details">
                    <div class="author-name">유키</div>
                    <div class="author-time" id="detail-date"></div>
                </div>
            </div>
            <div class="author-more">...</div>
        </div>
        <div class="post-title-text" id="detail-text"></div>
        <div class="post-image-container">
            <img id="detail-image" src="" alt="">
        </div>
    </div>
</div>

<script>
    // 포스트 목록
    let postData = [
        {
            text: "거래완료",
            image: "https://media.discordapp.net/attachments/1493112422976716860/1493112557634846751/1776056165058.jpg?ex=69ddc8ee&is=69dc776e&hm=c9cef8d83ebfecd77a0285a47dd5353e883d5291e084a064d97064a220e4a783&=&format=webp&width=423&height=825",
            date: "04.13. 오후 12:40"
        },
        {
            text: "거래완료",
            image: "https://media.discordapp.net/attachments/1493112422976716860/1493112562118557846/1776056165093.jpg?ex=69ddc8ef&is=69dc776f&hm=7ae0817b5a3f7100bb55a001c90f9af6edbcbada6c4cd4374db7802a0a9a7184&=&format=webp&width=423&height=825",
            date: "04.13. 오후 12:40"
        },
        {
            text: "거래완료",
            image: "https://media.discordapp.net/attachments/1493112422976716860/1493112566044688424/1776056165135.jpg?ex=69ddc8f0&is=69dc7770&hm=da28f052bd890dc636e978f17a41d51fa82a169f45912cc657dfa31977dac7a0&=&format=webp&width=224&height=438",
            date: "04.13. 오후 12:40"
        },
        {
            text: "거래완료",
            image: "https://media.discordapp.net/attachments/1493112422976716860/1493112569890865255/1776056165176.jpg?ex=69ddc8f1&is=69dc7771&hm=0075fb1791b73322a31c599a36b0b1f1b5be97a77421f2d74f019a62a96384fe&=&format=webp&width=423&height=825",
            date: "04.13. 오후 12:40"
        },
        {
            text: "거래완료",
            image: "https://media.discordapp.net/attachments/1493112422976716860/1493112573409628170/1776056165220.jpg?ex=69ddc8f2&is=69dc7772&hm=da257aa899ff0938707dbed926ea7e6cee2df91167f4d756a228c15f52907fe6&=&format=webp&width=423&height=825",
            date: "04.13. 오후 12:40"
        },
        {
            text: "거래완료",
            image: "https://media.discordapp.net/attachments/1493112422976716860/1493112577134166016/1776056165266.jpg?ex=69ddc8f3&is=69dc7773&hm=ad03dce44f297876a8c21e05f9e9d5742c035c0f0819f91cfcbf169e97663db2&=&format=webp&width=423&height=825",
            date: "04.13. 오후 12:40"
        },
        {
            text: "거래완료",
            image: "https://media.discordapp.net/attachments/1493112422976716860/1493112580636540989/1776056165305.jpg?ex=69ddc8f3&is=69dc7773&hm=5ccbfb8abc65e40dabea2278059fac1b22a868556cf15b1a4872dab95a9b21b5&=&format=webp&width=423&height=825",
            date: "04.13. 오후 12:40"
        },
        {
            text: "거래완료",
            image: "https://media.discordapp.net/attachments/1493112422976716860/1493112590572720158/1776056165329.jpg?ex=69ddc8f6&is=69dc7776&hm=b9380f39729cfdf61abf8b4cf61a40884349d6576a215af03613667be2795bfb&=&format=webp&width=423&height=825",
            date: "04.13. 오후 12:40"
        },
        {
            text: "거래완료",
            image: "https://media.discordapp.net/attachments/1493112422976716860/1493112607714836500/1776056164978.jpg?ex=69ddc8fa&is=69dc777a&hm=8d23bdf9b42c819f623438d6c018d0574af950bd621f4fe23eb89f25beb7fad6&=&format=webp&width=423&height=825",
            date: "04.13. 오후 12:40"
        }
    ];

    window.onload = () => {
        // 배열을 역순으로 뒤집어 가장 마지막에 입력한 데이터가 맨 처음에 렌더링되도록 처리
        postData.reverse();

        const gridContainer = document.getElementById('post-grid');
        let htmlContent = '';

        postData.forEach((post, index) => {
            const safeText = post.text.replace(/</g, "&lt;").replace(/>/g, "&gt;");
            htmlContent += `
                <div class="grid-item" onclick="openPost(${index})">
                    <div class="post-thumbnail" style="background-image: url('${post.image}');"></div>
                    <div class="post-preview-text">${safeText}</div>
                </div>
            `;
        });
        gridContainer.innerHTML = htmlContent;
    };

    function openPost(index) {
        const post = postData[index];
        document.getElementById('detail-date').innerText = post.date;
        document.getElementById('detail-text').innerText = post.text; 
        document.getElementById('detail-image').src = post.image;

        const postView = document.getElementById('post-view');
        const homeView = document.getElementById('home-view');

        homeView.classList.add('hide');
        postView.classList.remove('hide');
        postView.style.display = 'flex';
        
        postView.classList.remove('slide-out');
        postView.classList.add('slide-in');
        
        postView.scrollTop = 0;
    }

    function closePost() {
        const postView = document.getElementById('post-view');
        const homeView = document.getElementById('home-view');

        postView.classList.remove('slide-in');
        postView.classList.add('slide-out');

        setTimeout(() => {
            postView.classList.add('hide');
            postView.style.display = 'none';
            homeView.classList.remove('hide');
        }, 300);
    }
</script>
</body>
</html>
